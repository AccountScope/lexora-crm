version: "3.9"

services:
  web:
    image: ghcr.io/lexora/legal-crm-web:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: self_hosted
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://lexora.local}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: "pnpm start"
    volumes:
      - ./logs/web:/app/.logs

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-lexora}
      POSTGRES_USER: ${DB_USER:-lexora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:RELEASE.2024-02-04T22-36-13Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lexora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console

volumes:
  postgres-data:
  minio-data:
